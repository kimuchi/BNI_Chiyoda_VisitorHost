<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: sans-serif; padding: 20px; margin: 0;}
    #drop_zone { border: 2px dashed #ccc; padding: 30px; text-align: center; margin-bottom: 20px; background: #f9f9f9; color: #555;}
    .hidden { display: none; }
    button { padding: 10px 20px; cursor: pointer; border:none; border-radius:4px; font-weight:bold;}
    .btn-primary { background: #0055ff; color: #fff; }
    .btn-success { background: #4caf50; color: #fff; }
    
    /* 表のスタイル */
    .table-container { overflow-x: auto; max-height: 500px; border: 1px solid #ccc; margin-bottom: 15px;}
    table { border-collapse: collapse; width: max-content; }
    th, td { border: 1px solid #ddd; padding: 5px; text-align: left; font-size: 13px; }
    th { background-color: #f3f3f3; position: sticky; top: 0; z-index: 10;}
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 4px; border: 1px solid #ccc; font-size: 13px;}
    
    /* レビュー必要な箇所の強調 */
    .needs-review input { background-color: #ffe6e6; border: 1px solid #ff4d4d; font-weight: bold;}
    .inviter-review { background-color: #fff3cd; }
    tr.drag-over-row td { border-top: 3px solid #0055ff !important; }
    .drag-handle { cursor: grab; user-select: none; text-align: center; color: #999; font-size: 16px; }
    .drag-handle:active { cursor: grabbing; }
    .btn-sort { background: #ff9800; color: #fff; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="step1">
    <h3>1. 定例会を選択</h3>
    <select id="meetingSelect" style="padding:8px; margin-bottom:15px; width:100%;"><option value="">計算中...</option></select>
    
    <h3>2. CSVファイルを選択またはドロップ</h3>
    <div id="drop_zone">ここにCSVファイルをドロップ<br><br>または<br><br><input type="file" id="csvFile" accept=".csv"></div>
    <button class="btn-success" onclick="processFile()">全データを解析して編集画面へ</button>

    <div id="existingSheets" class="hidden" style="margin-top:20px; padding-top:15px; border-top:1px solid #ddd;">
      <h3>または、作成済みデータを再編集</h3>
      <select id="sheetSelect" style="padding:8px; margin-bottom:10px; width:100%;"></select>
      <button class="btn-primary" onclick="loadExisting()">このシートを読み込んで再編集</button>
    </div>
  </div>

  <div id="step2" class="hidden">
    <h3>データの全件確認・編集</h3>
    <p style="font-size:12px; color:#555;">※スペースが無かった氏名（赤色）や、招待者が不明な箇所（黄色）は自動推測されています。修正してください。</p>
    
    <button class="btn-sort" onclick="sortByFurigana()">ふりがなでソート</button>

    <div class="table-container">
      <table id="dataTable">
        <thead id="dataHead"></thead>
        <tbody id="dataBody"></tbody>
      </table>
    </div>

    <button class="btn-primary" onclick="submitFinal()" style="width:100%;">この内容でシートとPDFを作成する</button>
  </div>

  <div id="loading" class="hidden" style="margin-top:20px; font-weight:bold; color:#0055ff;">処理中です。しばらくお待ちください...</div>

  <script>
    var parsedData = null, parsedHeader = null, membersList = [], displayKeys = [];
    var dragSrcRow = null;

    window.onload = function() {
      google.script.run.withSuccessHandler(function(candidates) {
        var sel = document.getElementById('meetingSelect');
        sel.innerHTML = '';
        for(var i=0; i<candidates.length; i++){
          var opt = document.createElement('option');
          opt.value = candidates[i].dateValue; opt.dataset.display = candidates[i].display; opt.text = candidates[i].display;
          sel.appendChild(opt);
        }
      }).getMeetingCandidates();
      google.script.run.withSuccessHandler(function(sheets) {
        if (sheets.length === 0) return;
        var sel = document.getElementById('sheetSelect');
        for(var i=0; i<sheets.length; i++) {
          var opt = document.createElement('option');
          opt.value = sheets[i]; opt.text = sheets[i];
          sel.appendChild(opt);
        }
        document.getElementById('existingSheets').classList.remove('hidden');
      }).getExistingVisitorSheets();
    };

    var dropZone = document.getElementById('drop_zone');
    dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.style.background = '#e9e9e9'; });
    dropZone.addEventListener('dragleave', function(e) { e.preventDefault(); dropZone.style.background = '#f9f9f9'; });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault(); dropZone.style.background = '#f9f9f9';
      if (e.dataTransfer.files.length > 0) document.getElementById('csvFile').files = e.dataTransfer.files;
    });

    function loadExisting() {
      var sheetName = document.getElementById('sheetSelect').value;
      if (!sheetName) return alert('シートを選択してください');
      var sel = document.getElementById('meetingSelect');
      if (!sel.value) return alert('定例会を選択してください');
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      google.script.run.withSuccessHandler(showEditor).withFailureHandler(showError).loadSheetData(sheetName);
    }

    function processFile() {
      var sel = document.getElementById('meetingSelect');
      if (!sel.value) return alert('定例会を選択してください');
      var fileInput = document.getElementById('csvFile').files[0];
      if (!fileInput) return alert('CSVファイルを選択してください');

      document.getElementById('step1').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');

      var reader = new FileReader();
      reader.onload = function(e) {
        google.script.run.withSuccessHandler(showEditor).withFailureHandler(showError).analyzeCsvData(e.target.result);
      };
      reader.readAsText(fileInput, 'Shift_JIS'); 
    }

    function showEditor(result) {
      document.getElementById('loading').classList.add('hidden');
      parsedData = result.rows; parsedHeader = result.header; membersList = result.membersList;

      displayKeys = ["_No"];
      for(var i=0; i<parsedHeader.length; i++) displayKeys.push(parsedHeader[i]);
      renderTable();
      document.getElementById('step2').classList.remove('hidden');
    }

    function collectEdits() {
      var tbody = document.getElementById('dataBody');
      var rows = tbody.querySelectorAll('tr');
      for (var r = 0; r < rows.length; r++) {
        var inputs = rows[r].querySelectorAll('input[type="text"]');
        var idx = 0;
        for (var c = 0; c < displayKeys.length; c++) {
          if (displayKeys[c] !== "_No") { parsedData[r][displayKeys[c]] = inputs[idx].value; idx++; }
        }
      }
    }

    function renumber() {
      var vCount = 1, gCount = 1;
      for (var i = 0; i < parsedData.length; i++) {
        var r = parsedData[i];
        if (r["種別"] === "Visitor") { r._No = "V" + ("0" + vCount).slice(-2); vCount++; }
        else if (r["種別"] === "Guest") { r._No = "G" + ("0" + gCount).slice(-2); gCount++; }
      }
    }

    function renderTable() {
      var thead = document.getElementById('dataHead');
      var tbody = document.getElementById('dataBody');
      thead.innerHTML = ''; tbody.innerHTML = '';

      var hr = document.createElement('tr');
      var thDrag = document.createElement('th'); thDrag.innerText = '↕'; hr.appendChild(thDrag);
      for(var i=0; i<displayKeys.length; i++) {
        var th = document.createElement('th');
        th.innerText = displayKeys[i] === "_No" ? "自動No." : displayKeys[i];
        hr.appendChild(th);
      }
      thead.appendChild(hr);

      for (var r = 0; r < parsedData.length; r++) {
        var row = parsedData[r];
        var tr = document.createElement('tr');
        tr.draggable = true;
        tr.dataset.index = r;
        tr.addEventListener('dragstart', rowDragStart);
        tr.addEventListener('dragover', rowDragOver);
        tr.addEventListener('dragleave', rowDragLeave);
        tr.addEventListener('drop', rowDrop);
        tr.addEventListener('dragend', rowDragEnd);

        var tdHandle = document.createElement('td');
        tdHandle.className = 'drag-handle';
        tdHandle.innerText = '☰';
        tr.appendChild(tdHandle);

        for (var c = 0; c < displayKeys.length; c++) {
          var key = displayKeys[c];
          var td = document.createElement('td');
          if(key === "_No") {
            td.innerText = row[key] || "";
          } else {
            var input = document.createElement('input');
            input.type = 'text';
            input.value = row[key] || "";
            if (row._needsNameReview && (key === "参加者氏名" || key === "ふりがな")) td.className = "needs-review";
            if (row._needsInviterReview && key === "招待者") td.className = "inviter-review";
            td.appendChild(input);
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    function rowDragStart(e) { dragSrcRow = this; e.dataTransfer.effectAllowed = 'move'; this.style.opacity = '0.4'; }
    function rowDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; this.classList.add('drag-over-row'); }
    function rowDragLeave(e) { this.classList.remove('drag-over-row'); }
    function rowDragEnd(e) { this.style.opacity = '1'; var rows = document.querySelectorAll('#dataBody tr'); for(var i=0;i<rows.length;i++) rows[i].classList.remove('drag-over-row'); }
    function rowDrop(e) {
      e.preventDefault(); this.classList.remove('drag-over-row');
      if (dragSrcRow === this) return;
      collectEdits();
      var fromIdx = parseInt(dragSrcRow.dataset.index), toIdx = parseInt(this.dataset.index);
      var item = parsedData.splice(fromIdx, 1)[0];
      parsedData.splice(toIdx, 0, item);
      renumber();
      renderTable();
    }

    function sortByFurigana() {
      collectEdits();
      var typeOrder = { "Visitor": 1, "Guest": 2, "Substitute": 3 };
      parsedData.sort(function(a, b) {
        var tA = typeOrder[a["種別"]] || 99, tB = typeOrder[b["種別"]] || 99;
        if (tA !== tB) return tA - tB;
        return (a["ふりがな"] || "").localeCompare((b["ふりがな"] || ""), 'ja');
      });
      renumber();
      renderTable();
    }

    function submitFinal() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('loading').innerText = 'シートとPDFを作成しています... 少し時間がかかります。';

      collectEdits();

      var sel = document.getElementById('meetingSelect');
      var dateVal = sel.value, displayVal = sel.options[sel.selectedIndex].dataset.display;

      google.script.run.withSuccessHandler(function(htmlMsg){
        document.getElementById('loading').innerHTML = htmlMsg;
      }).withFailureHandler(showError).createFinalSheet(dateVal, displayVal, parsedData, parsedHeader);
    }

    function showError(err) {
      alert("エラーが発生しました: " + err.message);
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
    }
  </script>
</body>
</html>
