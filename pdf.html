<!DOCTYPE html>
<html>
<head><base target="_top"></head>
<body style="font-family: sans-serif; padding: 20px;">
  <p>添付PDFから番号と氏名を抽出し、「メンバーリスト」シートに保存します。</p>
  <form id="pdfForm" onsubmit="event.preventDefault(); uploadPdf();">
    <input type="file" name="pdfFile" accept=".pdf" required><br><br>
    <button type="submit" id="btn" style="padding: 8px 16px;">アップロードして解析</button>
  </form>
  <div id="msg" style="margin-top:15px; color: #0066cc; font-weight:bold;"></div>
  
  <script>
    function uploadPdf() {
      document.getElementById('btn').disabled = true;
      document.getElementById('msg').innerText = 'Google Docsを用いたOCR解析中です。数秒〜十数秒かかります...';
      var form = document.getElementById('pdfForm');
      google.script.run.withSuccessHandler(function(res){
        document.getElementById('msg').innerText = res;
        document.getElementById('msg').style.color = 'green';
        document.getElementById('btn').disabled = false;
      }).withFailureHandler(function(err){
        document.getElementById('msg').innerText = 'エラー: ' + err.message + '\n※事前に「拡張機能 > Apps Script」の左側「サービス」から「Drive API」が追加されているか確認してください。';
        document.getElementById('msg').style.color = 'red';
        document.getElementById('btn').disabled = false;
      }).processPdfForm(form);
    }
  </script>
</body>
</html>
