<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: sans-serif; padding: 20px; margin: 0; background: #fff; line-height: 1.7; color: #333; font-size: 14px; }
    h1 { font-size: 20px; border-bottom: 3px solid #d35400; padding-bottom: 8px; color: #d35400; }
    h2 { font-size: 17px; margin-top: 30px; padding: 6px 10px; background: #fdf2e9; border-left: 4px solid #d35400; color: #d35400; }
    h3 { font-size: 15px; margin-top: 20px; color: #555; }
    h4 { font-size: 14px; margin-top: 15px; color: #666; }
    table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
    th { background: #f3f3f3; font-weight: bold; }
    code { background: #f5f5f5; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
    blockquote { border-left: 3px solid #f39c12; padding: 5px 15px; margin: 10px 0; background: #fffcf0; color: #555; }
    hr { border: none; border-top: 1px solid #ddd; margin: 20px 0; }
    a { color: #0055ff; }
    ul, ol { padding-left: 25px; }
    li { margin-bottom: 4px; }
    .loading { text-align: center; padding: 50px; color: #888; }
  </style>
</head>
<body>
  <div id="content" class="loading">マニュアルを読み込み中...</div>
  <script>
    google.script.run.withSuccessHandler(function(html) {
      document.getElementById('content').innerHTML = html;
      document.getElementById('content').className = '';
    }).withFailureHandler(function(err) {
      document.getElementById('content').innerHTML = '<p style="color:red;">読み込みエラー: ' + err.message + '</p>';
    }).getManualHtml();
  </script>
</body>
</html>
