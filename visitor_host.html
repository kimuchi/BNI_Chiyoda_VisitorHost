<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: sans-serif; padding: 15px; }
    h3 { color: #d35400; margin-top: 0; }
    .hint { font-size: 12px; color: #555; margin-bottom: 15px; }
    .member-list { max-height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; border-radius: 4px; background: #f9f9f9;}
    .member-item { margin-bottom: 6px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .member-item label { cursor: pointer; flex: 1; min-width: 0; }
    .priority-input { width: 45px; padding: 3px 4px; font-size: 12px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
    .priority-label { font-size: 10px; color: #888; white-space: nowrap; }
    .btn-save { background: #4caf50; color: white; padding: 12px; width: 100%; border: none; font-weight: bold; font-size: 15px; border-radius: 4px; margin-top: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <h3>ビジターホスト・優先順位の設定</h3>
  <div class="hint">
    チェック: ビジターホストとして記憶され、AI割り振りで優先的にファシリ・オリエン担当に選ばれます。<br>
    優先順位: 数値が小さいほどオリエンに優先的に割り振られます。空欄は最低優先です。
  </div>

  <div style="display:flex; gap:10px; font-size:11px; color:#666; margin-bottom:8px; padding:0 5px;">
    <span style="width:20px;"></span>
    <span style="flex:1;">メンバー</span>
    <span class="priority-label">優先順位</span>
  </div>
  <div class="member-list" id="memberList">読み込み中...</div>

  <button class="btn-save" onclick="save()">設定を保存する</button>

  <script>
    var members = [];
    var savedHosts = [];
    var savedPriorities = {};

    window.onload = function() {
      google.script.run.withSuccessHandler(function(list) {
        members = list;
        google.script.run.withSuccessHandler(function(hosts) {
          savedHosts = hosts;
          google.script.run.withSuccessHandler(function(priorities) {
            savedPriorities = priorities || {};
            render();
          }).getMemberPriorities();
        }).getVisitorHosts();
      }).getMembersList();
    };

    function render() {
      var container = document.getElementById('memberList');
      container.innerHTML = '';

      if(members.length === 0) {
        container.innerHTML = "メンバーリストがありません。先に「メンバーリスト(OCR)の更新」を行ってください。";
        return;
      }

      for(var i = 0; i < members.length; i++) {
        var m = members[i];
        var isChecked = savedHosts.includes(m.no) ? 'checked' : '';
        var priorityVal = savedPriorities[m.no] !== undefined ? savedPriorities[m.no] : '';

        var div = document.createElement('div');
        div.className = 'member-item';
        div.innerHTML = '<label><input type="checkbox" id="chk_' + m.no + '" value="' + m.no + '" ' + isChecked + '> ' + m.no + ' : ' + m.name + '</label>' +
          '<input type="number" id="pri_' + m.no + '" class="priority-input" value="' + priorityVal + '" min="1" placeholder="-">';
        container.appendChild(div);
      }
    }

    function save() {
      var newHosts = [];
      var newPriorities = {};
      for(var i = 0; i < members.length; i++) {
        var chk = document.getElementById('chk_' + members[i].no);
        if(chk && chk.checked) {
          newHosts.push(members[i].no);
        }
        var pri = document.getElementById('pri_' + members[i].no);
        if(pri && pri.value !== '' && !isNaN(parseInt(pri.value))) {
          newPriorities[members[i].no] = parseInt(pri.value);
        }
      }

      document.body.innerHTML = "<h3 style='color:#0055ff; text-align:center; margin-top:50px;'>保存中...</h3>";
      google.script.run.withSuccessHandler(function(msg1){
        google.script.run.withSuccessHandler(function(msg2){
          document.body.innerHTML = "<h3 style='color:green; text-align:center; margin-top:50px;'>保存しました</h3><p style='text-align:center;'>画面を閉じてください。</p>";
        }).saveMemberPriorities(newPriorities);
      }).saveVisitorHosts(newHosts);
    }
  </script>
</body>
</html>
